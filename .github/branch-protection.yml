# Codified branch protection rules for `main`. Source of truth. The repository admin applies these rules either through the GitHub Settings -> Branches -> Branch protection rule UI for `main`, or by running `node scripts/apply-branch-protection.mjs` which calls `gh api repos/:owner/:repo/branches/main/protection` with the JSON form of this file.

branches:
  main:
    required_pull_request_reviews:
      required_approving_review_count: 1
      dismiss_stale_reviews: true
      require_code_owner_reviews: true
      require_last_push_approval: true
    required_status_checks:
      strict: true
      contexts:
        - install
        - typecheck
        - lint
        - test-unit
        - test-coverage
        - audit
        - character-set-audit
        - comment-discipline-audit
        - interface-audit
        - eslint-disable-audit
        - stryker-disable-audit
        - ts-ignore-audit
        - trufflehog
        - codeql
        - semgrep
        - license-check
        - pr-conventional-commits
    required_signatures: true
    required_linear_history: true
    required_conversation_resolution: true
    enforce_admins: false
    allow_force_pushes: false
    allow_deletions: false
    block_creations: false
    lock_branch: false
    allow_fork_syncing: true
    restrictions:
      users: ['Priyesh-ElevateFinance']
      teams: []
      apps: []
    bypass_pull_request_allowances:
      users: ['Priyesh-ElevateFinance']
      teams: []
      apps: []
