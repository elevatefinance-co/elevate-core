# Composite action that prepares the elevate-core workspace for any pnpm-driven job. The caller is responsible for the initial actions/checkout (so this composite reference resolves). The composite then (1) enables corepack on the runner's pre-installed Node so pnpm is on PATH BEFORE setup-node@v5's packageManager auto-detection runs (otherwise v5 errors with "Unable to locate executable file: pnpm"), (2) provisions Node 24 with corepack-managed pnpm pinned via the packageManager field in package.json, (3) caches the pnpm store keyed off pnpm-lock.yaml so the second-through-Nth job restore is instant, (4) runs the frozen-lockfile install.

name: setup-elevate-core
description: Provision Node 24 plus corepack-managed pnpm, restore the pnpm store cache, run pnpm install with the frozen lockfile.

runs:
  using: composite
  steps:
    - name: enable corepack on the runner's pre-installed Node so pnpm is on PATH before setup-node@v5 validates the packageManager field
      shell: bash
      run: corepack enable

    - name: setup Node 24
      uses: actions/setup-node@v5
      with:
        node-version: '24'

    - name: enable corepack on the freshly-provisioned Node 24 toolchain
      shell: bash
      run: corepack enable

    - name: cache the pnpm store keyed off pnpm-lock.yaml
      uses: actions/cache@v5
      with:
        path: ~/.local/share/pnpm/store
        key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: pnpm-${{ runner.os }}-

    - name: pnpm install with frozen lockfile
      shell: bash
      run: pnpm install --frozen-lockfile
