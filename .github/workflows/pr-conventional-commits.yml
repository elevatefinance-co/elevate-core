# Conventional Commits validation. Re-runs commitlint against every commit in the PR plus the squash-merge subject composed from the PR title, and against every commit on a direct push (including a force-push to a re-squashed branch). The PR title is passed to the shell via the PR_TITLE env var rather than direct ${{ }} interpolation so a malicious title cannot inject shell commands into the runner. The push-context block probes whether github.event.before is still reachable; on a force-push to a re-squashed branch the previous tip is dangling, so the workflow falls back to validating the new HEAD commit only.

name: pr-conventional-commits

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

permissions:
  contents: read

jobs:
  validate-commits:
    name: pr-conventional-commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-elevate-core
      - name: validate every commit in the PR plus the squash-merge subject from the PR title (PR context)
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pnpm exec commitlint --from "$PR_BASE_SHA" --to "$PR_HEAD_SHA"
          printf '%s\n' "$PR_TITLE" | pnpm exec commitlint
      - name: validate the new commits relative to the previous push state (push context; resilient to force-push and orphan-root pushes)
        if: github.event_name == 'push'
        env:
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          zero='0000000000000000000000000000000000000000'
          has_parent() { git rev-parse --verify HEAD~1 >/dev/null 2>&1; }
          validate_range() { pnpm exec commitlint --from "$1" --to HEAD; }
          validate_head_only() { git log -1 --format='%B' HEAD | pnpm exec commitlint; }
          if [ "$PUSH_BEFORE" = "$zero" ] || ! git cat-file -e "$PUSH_BEFORE^{commit}" 2>/dev/null; then
            if has_parent; then
              echo "Previous tip is unreachable or new branch; validating HEAD~1..HEAD."
              validate_range HEAD~1
            else
              echo "Previous tip is unreachable and HEAD is the root commit; validating HEAD message only."
              validate_head_only
            fi
          else
            validate_range "$PUSH_BEFORE"
          fi
